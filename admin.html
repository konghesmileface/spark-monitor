<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — Spark Monitor</title>
  <link rel="icon" href="/favico/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #00d4ff; --accent2: #00e88f; --accent3: #a855f7;
      --bg: #0a0e1a; --bg-card: #111827; --bg-card2: #151d2e; --bg-hover: #1a2332;
      --text: #e8eef5; --text-sec: #8b96b1; --text-muted: #4b5563;
      --border: rgba(0,212,255,0.12); --error: #ef4444; --success: #22c55e; --warn: #f59e0b;
    }
    body {
      font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== SIDEBAR ===== */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px; flex-shrink: 0; background: var(--bg-card);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
    }
    .sidebar-brand {
      padding: 20px 20px 16px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand svg { width: 24px; height: 24px; color: var(--accent); flex-shrink: 0; }
    .sidebar-brand span {
      font-size: 15px; font-weight: 800; letter-spacing: -0.3px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sidebar-nav { padding: 12px 10px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-sec);
      cursor: pointer; transition: all .2s; margin-bottom: 2px;
    }
    .nav-item i { font-size: 16px; width: 20px; text-align: center; }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.active { background: rgba(0,212,255,0.08); color: var(--accent); }
    .nav-item .nav-badge {
      margin-left: auto; background: var(--error); color: #fff; font-size: 10px;
      font-weight: 700; padding: 1px 6px; border-radius: 8px; min-width: 18px; text-align: center;
    }
    .sidebar-footer {
      padding: 14px 16px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted);
    }
    .sidebar-footer .admin-email { color: var(--text-sec); font-size: 12px; margin-bottom: 8px; word-break: break-all; }
    .sidebar-footer .btn-logout {
      display: flex; align-items: center; gap: 6px; width: 100%;
      background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text-sec);
      padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .2s;
    }
    .sidebar-footer .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* ===== MAIN ===== */
    .main { margin-left: 220px; flex: 1; min-height: 100vh; }

    /* Stats bar */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      padding: 24px 32px 0;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card--total::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .stat-card--pending::before { background: var(--warn); }
    .stat-card--approved::before { background: var(--success); }
    .stat-card--suspended::before { background: var(--text-muted); }
    .stat-card .stat-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; margin-bottom: 10px;
    }
    .stat-card--total .stat-icon { background: rgba(0,212,255,0.1); color: var(--accent); }
    .stat-card--pending .stat-icon { background: rgba(245,158,11,0.1); color: var(--warn); }
    .stat-card--approved .stat-icon { background: rgba(34,197,94,0.1); color: var(--success); }
    .stat-card--suspended .stat-icon { background: rgba(75,85,99,0.1); color: var(--text-muted); }
    .stat-num { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Page header */
    .page-head {
      padding: 24px 32px 0; display: flex; align-items: center; justify-content: space-between;
    }
    .page-head h2 { font-size: 18px; font-weight: 700; }
    .page-head .search-box {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 6px 12px;
    }
    .page-head .search-box i { color: var(--text-muted); font-size: 14px; }
    .page-head .search-box input {
      background: none; border: none; color: var(--text); font-size: 13px;
      outline: none; width: 200px; font-family: inherit;
    }
    .page-head .search-box input::placeholder { color: var(--text-muted); }

    /* Content area */
    .content-area { padding: 16px 32px 32px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* Table */
    .admin-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      font-size: 13px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    }
    .admin-table th {
      text-align: left; padding: 12px 16px; color: var(--text-muted);
      font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      background: var(--bg-card2); border-bottom: 1px solid var(--border);
    }
    .admin-table td {
      padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tbody tr { transition: background .15s; }
    .admin-table tbody tr:hover td { background: var(--bg-hover); }

    .badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; display: inline-block; }
    .badge-pending { background: rgba(245,158,11,0.12); color: var(--warn); }
    .badge-approved { background: rgba(34,197,94,0.12); color: #86efac; }
    .badge-rejected { background: rgba(239,68,68,0.12); color: #fca5a5; }
    .badge-suspended { background: rgba(156,163,175,0.12); color: #9ca3af; }

    .btn-action {
      padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: none; transition: all .2s;
    }
    .btn-approve { background: rgba(34,197,94,0.12); color: #86efac; }
    .btn-approve:hover { background: rgba(34,197,94,0.25); }
    .btn-reject { background: rgba(239,68,68,0.12); color: #fca5a5; margin-left: 6px; }
    .btn-reject:hover { background: rgba(239,68,68,0.25); }
    .btn-suspend { background: rgba(156,163,175,0.12); color: #9ca3af; }
    .btn-suspend:hover { background: rgba(156,163,175,0.25); }
    .btn-detail { background: rgba(0,212,255,0.1); color: var(--accent); margin-left: 4px; }
    .btn-detail:hover { background: rgba(0,212,255,0.2); }
    .btn-key { background: rgba(245,158,11,0.12); color: var(--warn); margin-left: 4px; }
    .btn-key:hover { background: rgba(245,158,11,0.25); }
    .btn-edit { background: rgba(168,85,247,0.12); color: #c084fc; margin-left: 4px; }
    .btn-edit:hover { background: rgba(168,85,247,0.25); }

    .company-cell { display: flex; align-items: center; gap: 10px; }
    .company-avatar {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,232,143,0.15));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .company-name { font-weight: 600; color: var(--text); }
    .company-email { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .empty {
      text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    }
    .empty i { font-size: 36px; display: block; margin-bottom: 12px; opacity: 0.3; }
    .loading { text-align: center; padding: 60px 20px; color: var(--text-sec); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 200; }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
      padding: 28px; width: 440px; max-width: 90vw;
    }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal textarea {
      width: 100%; min-height: 80px; padding: 10px 12px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
      color: var(--text); font-size: 14px; font-family: inherit; resize: vertical; outline: none;
    }
    .modal textarea:focus { border-color: var(--accent); }
    .modal textarea::placeholder { color: var(--text-muted); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .modal .btn-cancel {
      padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: var(--text-sec); cursor: pointer; font-size: 13px; font-weight: 500;
    }
    .modal .btn-confirm {
      padding: 8px 18px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0e1a; font-weight: 700; cursor: pointer; font-size: 13px;
    }

    /* Create form */
    .create-form {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 28px 32px; max-width: 680px;
    }
    .create-form h3 {
      font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 20px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .create-form h3 i { font-size: 16px; }
    .create-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .create-form .form-group { margin-bottom: 16px; }
    .create-form label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sec); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
    .create-form label .req { color: var(--error); }
    .create-form input, .create-form select, .create-form textarea {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
      color: var(--text); font-size: 14px; outline: none; transition: border .2s; font-family: inherit;
    }
    .create-form input:focus, .create-form select:focus, .create-form textarea:focus { border-color: var(--accent); }
    .create-form input::placeholder, .create-form textarea::placeholder { color: var(--text-muted); }
    .create-form select option { background: var(--bg-card); color: var(--text); }
    .create-form textarea { min-height: 60px; resize: vertical; }
    .create-form .form-actions { display: flex; gap: 12px; margin-top: 8px; }
    .create-form .btn-submit {
      padding: 10px 32px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0e1a; font-weight: 700; font-size: 14px; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; gap: 6px;
    }
    .create-form .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.3); }
    .create-form .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .create-form .btn-reset {
      padding: 10px 20px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12); background: transparent;
      color: var(--text-sec); font-size: 13px; cursor: pointer;
    }
    .create-form .form-msg {
      padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
    }
    .create-form .form-msg.msg-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; display: block; }
    .create-form .form-msg.msg-success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #86efac; display: block; }
    .create-form .form-section-title { font-size: 13px; font-weight: 600; color: var(--text-sec); margin: 20px 0 12px; padding-top: 16px; border-top: 1px solid var(--border); }
    .chip-select { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { display: inline-block; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); color: var(--text-sec); transition: all .2s; user-select: none; }
    .chip.active { background: rgba(0,212,255,0.15); border-color: var(--accent); color: var(--accent); }
    .tags-input { display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px; padding: 6px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); cursor: text; }
    .tags-input:focus-within { border-color: var(--accent); }
    .tags-input .tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(0,212,255,0.15); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .tags-input .tag button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
    .tags-input input { border: none; background: none; color: var(--text); font-size: 13px; outline: none; min-width: 100px; flex: 1; padding: 2px 4px; }
    .tags-input input::placeholder { color: var(--text-muted); }

    /* Expiry badges */
    .expiry-active { color: var(--success); font-size: 12px; font-weight: 600; }
    .expiry-warning { color: var(--warn); font-size: 12px; font-weight: 600; }
    .expiry-expired { color: var(--error); font-size: 12px; font-weight: 600; }
    .expiry-none { color: var(--text-muted); font-size: 12px; font-style: italic; }
    .btn-expiry { background: rgba(0,212,255,0.1); color: var(--accent); border: none; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 4px; }
    .btn-expiry:hover { background: rgba(0,212,255,0.2); }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar { width: 64px; }
      .sidebar-brand span, .nav-item span, .nav-item .nav-badge, .sidebar-footer .admin-email { display: none; }
      .sidebar-brand { justify-content: center; padding: 16px 8px; }
      .nav-item { justify-content: center; padding: 10px; }
      .nav-item i { margin: 0; }
      .main { margin-left: 64px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>Spark Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-tab="applications">
        <i class="bi bi-inbox"></i>
        <span>待审核申请</span>
        <span class="nav-badge" id="pendingCount" style="display:none">0</span>
      </div>
      <div class="nav-item" data-tab="users">
        <i class="bi bi-people"></i>
        <span>用户管理</span>
      </div>
      <div class="nav-item" data-tab="create">
        <i class="bi bi-person-plus"></i>
        <span>新建账户</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-email" id="adminEmail"></div>
      <button class="btn-logout" id="logoutBtn">
        <i class="bi bi-box-arrow-left"></i> <span>退出登录</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main">
    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card stat-card--total">
        <div class="stat-icon"><i class="bi bi-building"></i></div>
        <div class="stat-num" id="statTotal">-</div>
        <div class="stat-label">总企业数</div>
      </div>
      <div class="stat-card stat-card--pending">
        <div class="stat-icon"><i class="bi bi-hourglass-split"></i></div>
        <div class="stat-num" id="statPending">-</div>
        <div class="stat-label">待审核</div>
      </div>
      <div class="stat-card stat-card--approved">
        <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
        <div class="stat-num" id="statApproved">-</div>
        <div class="stat-label">已通过</div>
      </div>
      <div class="stat-card stat-card--suspended">
        <div class="stat-icon"><i class="bi bi-pause-circle"></i></div>
        <div class="stat-num" id="statSuspended">-</div>
        <div class="stat-label">已暂停</div>
      </div>
    </div>

    <!-- Applications Panel -->
    <div class="panel active" id="panel-applications">
      <div class="page-head">
        <h2><i class="bi bi-inbox" style="color:var(--accent);margin-right:8px;font-size:16px"></i>待审核申请</h2>
      </div>
      <div class="content-area">
        <div class="loading" id="appLoading">加载中...</div>
        <table class="admin-table" id="appTable" style="display:none">
          <thead>
            <tr><th style="width:28%">企业信息</th><th>联系人</th><th>电话</th><th>行业</th><th>规模</th><th>申请时间</th><th style="width:120px">操作</th></tr>
          </thead>
          <tbody id="appBody"></tbody>
        </table>
        <div class="empty" id="appEmpty" style="display:none">
          <i class="bi bi-inbox"></i>暂无待审核申请
        </div>
      </div>
    </div>

    <!-- Users Panel -->
    <div class="panel" id="panel-users">
      <div class="page-head">
        <h2><i class="bi bi-people" style="color:var(--accent);margin-right:8px;font-size:16px"></i>用户管理</h2>
        <div class="search-box">
          <i class="bi bi-search"></i>
          <input type="text" id="userSearch" placeholder="搜索企业名称或邮箱..." />
        </div>
      </div>
      <div class="content-area">
        <div class="loading" id="userLoading">加载中...</div>
        <table class="admin-table" id="userTable" style="display:none">
          <thead>
            <tr><th style="width:24%">企业信息</th><th>联系人</th><th>到期时间</th><th>注册时间</th><th>最近登录</th><th>状态</th><th style="width:140px">操作</th></tr>
          </thead>
          <tbody id="userBody"></tbody>
        </table>
        <div class="empty" id="userEmpty" style="display:none">
          <i class="bi bi-people"></i>暂无用户
        </div>
      </div>
    </div>

    <!-- Create Account Panel -->
    <div class="panel" id="panel-create">
      <div class="page-head">
        <h2><i class="bi bi-person-plus" style="color:var(--accent);margin-right:8px;font-size:16px"></i>新建账户</h2>
      </div>
      <div class="content-area">
        <div class="create-form">
          <h3><i class="bi bi-shield-check"></i> 创建企业账户（直接激活，无需审核）</h3>
          <div id="createMsg" class="form-msg"></div>
          <form id="createForm">
            <div class="form-row">
              <div class="form-group">
                <label>企业邮箱 <span class="req">*</span></label>
                <input type="email" name="email" placeholder="name@company.com" required />
              </div>
              <div class="form-group">
                <label>初始密码 <span class="req">*</span></label>
                <input type="text" name="password" placeholder="至少6位" required minlength="6" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>联系人姓名 <span class="req">*</span></label>
                <input type="text" name="contact_name" placeholder="姓名" required />
              </div>
              <div class="form-group">
                <label>联系电话</label>
                <input type="tel" name="contact_phone" placeholder="手机号码" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>企业名称 <span class="req">*</span></label>
                <input type="text" name="company_name" placeholder="公司全称" required />
              </div>
              <div class="form-group">
                <label>企业规模</label>
                <select name="company_size">
                  <option value="">请选择</option>
                  <option value="micro">微型 (1-10人)</option>
                  <option value="small">小型 (11-50人)</option>
                  <option value="medium">中型 (51-300人)</option>
                  <option value="large">大型 (301-1000人)</option>
                  <option value="enterprise">集团 (1000+人)</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>订阅到期日</label>
                <input type="date" name="expires_at" />
              </div>
              <div class="form-group">
                <label>快捷设置</label>
                <div style="display:flex;gap:6px;margin-top:2px">
                  <button type="button" class="btn-action btn-approve" id="expiryQuick1y" style="font-size:11px">+1年</button>
                  <button type="button" class="btn-action btn-approve" id="expiryQuick2y" style="font-size:11px">+2年</button>
                  <button type="button" class="btn-action btn-approve" id="expiryQuick3y" style="font-size:11px">+3年</button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>主营业务</label>
              <textarea name="business_scope" placeholder="简述公司主营业务方向"></textarea>
            </div>
            <div class="form-section-title">企业画像（可选，影响情报推荐精准度）</div>
            <div class="form-group">
              <label>关注行业（多选）</label>
              <div class="chip-select" id="createIndustryChips"></div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>主要竞争对手</label>
                <div class="tags-input" id="createCompetitorTags"><input placeholder="输入后按回车添加" /></div>
              </div>
              <div class="form-group">
                <label>上游供应链</label>
                <div class="tags-input" id="createSupplyUpTags"><input placeholder="输入后按回车添加" /></div>
              </div>
            </div>
            <div class="form-group">
              <label>下游客户</label>
              <div class="tags-input" id="createSupplyDownTags"><input placeholder="输入后按回车添加" /></div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-submit" id="createBtn"><i class="bi bi-plus-circle"></i> 创建账户</button>
              <button type="reset" class="btn-reset">重置</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Subscription Modal -->
<div class="modal-overlay" id="subModal">
  <div class="modal">
    <h3><i class="bi bi-calendar-check" style="color:var(--accent);margin-right:6px"></i>设置订阅到期日</h3>
    <p style="font-size:13px;color:var(--text-sec);margin-bottom:12px" id="subInfo"></p>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:12px;color:var(--text-sec);margin-bottom:4px">到期日期</label>
      <input type="date" id="subDate" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:var(--text);font-size:14px;outline:none" />
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button type="button" class="btn-action btn-approve" id="subQuick1y" style="font-size:12px">+1年</button>
      <button type="button" class="btn-action btn-approve" id="subQuick2y" style="font-size:12px">+2年</button>
      <button type="button" class="btn-action btn-approve" id="subQuick3y" style="font-size:12px">+3年</button>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="subCancel">取消</button>
      <button class="btn-confirm" id="subConfirm">确认设置</button>
    </div>
  </div>
</div>

<!-- Password Reset Modal -->
<div class="modal-overlay" id="pwModal">
  <div class="modal">
    <h3><i class="bi bi-key" style="color:var(--accent);margin-right:6px"></i>重置密码</h3>
    <p style="font-size:13px;color:var(--text-sec);margin-bottom:12px" id="pwInfo"></p>
    <div id="pwResult" style="display:none">
      <div style="background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:14px;margin-bottom:12px">
        <div style="font-size:12px;color:var(--text-sec);margin-bottom:6px">新密码（请复制发送给用户）</div>
        <div style="display:flex;align-items:center;gap:8px">
          <code id="pwNewPassword" style="font-size:18px;font-weight:700;color:#86efac;flex:1;word-break:break-all"></code>
          <button id="pwCopy" class="btn-action btn-approve" style="white-space:nowrap">
            <i class="bi bi-clipboard"></i> 复制
          </button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="pwCancel">关闭</button>
      <button class="btn-confirm" id="pwConfirm" style="background:var(--warn);">确认重置</button>
    </div>
  </div>
</div>

<!-- User Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal" style="width:520px">
    <h3><i class="bi bi-pencil-square" style="color:var(--accent);margin-right:6px"></i>编辑用户</h3>
    <div id="editMsg" class="form-msg" style="padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:10px;display:none"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px">联系人</label>
        <input id="editContactName" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--text);font-size:13px;outline:none" />
      </div>
      <div>
        <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px">电话</label>
        <input id="editContactPhone" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--text);font-size:13px;outline:none" />
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div>
        <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px">企业名称</label>
        <input id="editCompanyName" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--text);font-size:13px;outline:none" />
      </div>
      <div>
        <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px">企业规模</label>
        <select id="editCompanySize" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--text);font-size:13px;outline:none">
          <option value="">未设置</option>
          <option value="micro">微型</option>
          <option value="small">小型</option>
          <option value="medium">中型</option>
          <option value="large">大型</option>
          <option value="enterprise">集团</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <label style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px">主营业务</label>
      <textarea id="editBusinessScope" rows="2" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--text);font-size:13px;outline:none;resize:vertical;font-family:inherit"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="editCancel">取消</button>
      <button class="btn-confirm" id="editConfirm">保存修改</button>
    </div>
  </div>
</div>

<!-- Application Detail Modal -->
<div class="modal-overlay" id="appDetailModal">
  <div class="modal" style="width:560px">
    <h3><i class="bi bi-building" style="color:var(--accent);margin-right:6px"></i>申请详情</h3>
    <div id="appDetailContent" style="font-size:13px;line-height:1.8"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-cancel" id="appDetailClose">关闭</button>
    </div>
  </div>
</div>

<!-- Reject Modal -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <h3><i class="bi bi-x-circle" style="color:var(--error);margin-right:6px"></i>拒绝申请</h3>
    <p style="font-size:13px;color:var(--text-sec);margin-bottom:12px" id="rejectInfo"></p>
    <textarea id="rejectNote" placeholder="拒绝原因（可选）"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="rejectCancel">取消</button>
      <button class="btn-confirm" id="rejectConfirm" style="background:var(--error);">确认拒绝</button>
    </div>
  </div>
</div>

<script type="module" src="/src/admin-main.ts"></script>
</body>
</html>
