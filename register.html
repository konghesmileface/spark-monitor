<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企业注册申请 — Spark Monitor 世界监控</title>
  <meta name="description" content="申请Spark Monitor企业账号，接入AI驱动的全球情报监控与决策支持系统。" />
  <meta name="keywords" content="Spark Monitor注册,企业注册,世界监控" />
  <meta name="robots" content="noindex, follow" />
  <meta property="og:title" content="企业注册申请 — Spark Monitor 世界监控" />
  <meta property="og:description" content="申请Spark Monitor企业账号，接入AI驱动的全球情报监控与决策支持系统。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sparkmonitor.cn/register.html" />
  <meta property="og:site_name" content="Spark Monitor" />
  <meta property="og:locale" content="zh_CN" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="企业注册申请 — Spark Monitor 世界监控" />
  <meta name="twitter:description" content="申请Spark Monitor企业账号，接入AI驱动的全球情报监控与决策支持系统。" />
  <link rel="icon" href="/favico/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #00d4ff; --accent2: #00e88f;
      --bg: #0a0e1a; --bg-card: #111827;
      --text: #e8eef5; --text-sec: #8b96b1; --text-muted: #4b5563;
      --border: rgba(0,212,255,0.15); --error: #ef4444; --success: #22c55e;
    }
    body {
      font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 24px; -webkit-font-smoothing: antialiased;
    }
    .register-container { max-width: 900px; margin: 0 auto; }
    .register-brand { text-align: center; margin-bottom: 24px; padding-top: 12px; }
    .register-brand svg { width: 36px; height: 36px; color: var(--accent); margin-bottom: 8px; }
    .register-brand h1 { font-size: 22px; font-weight: 700; }
    .register-brand h1 span {
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .register-brand p { font-size: 14px; color: var(--text-sec); margin-top: 4px; }

    .register-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 32px;
    }
    .form-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    @media (max-width: 768px) { .form-columns { grid-template-columns: 1fr; } }
    .form-section h3 { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sec); margin-bottom: 5px; }
    .form-group label .required { color: var(--error); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 9px 12px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
      color: var(--text); font-size: 14px; outline: none; transition: border .2s;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--text-muted); }
    .form-group textarea { min-height: 60px; resize: vertical; }
    .form-group select option { background: var(--bg-card); color: var(--text); }

    .tags-input { display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px; padding: 6px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); cursor: text; }
    .tags-input:focus-within { border-color: var(--accent); }
    .tags-input .tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(0,212,255,0.15); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .tags-input .tag button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
    .tags-input input { border: none; background: none; color: var(--text); font-size: 13px; outline: none; min-width: 100px; flex: 1; padding: 2px 4px; }

    .chip-select { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { display: inline-block; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); color: var(--text-sec); transition: all .2s; user-select: none; }
    .chip.active { background: rgba(0,212,255,0.15); border-color: var(--accent); color: var(--accent); }

    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .msg-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .msg-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .msg.show { display: block; }

    .form-actions { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }
    .btn-submit {
      padding: 12px 40px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0e1a; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: all .2s;
    }
    .btn-submit:hover { background: linear-gradient(135deg, #33e0ff, #33eda5); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.3); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-back { padding: 12px 24px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: var(--text-sec); font-size: 14px; cursor: pointer; }

    .login-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
    .login-link a { color: var(--accent); }
  </style>
</head>
<body>
<div class="register-container">
  <div class="register-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <h1><span>Spark Monitor</span> 企业注册申请</h1>
    <p>提交申请后，我们将在1-2个工作日内完成审核</p>
  </div>

  <div class="register-card">
    <div id="msgBox" class="msg"></div>
    <form id="registerForm">
      <div class="form-columns">
        <!-- Left: Account Info -->
        <div class="form-section">
          <h3>账号信息</h3>
          <div class="form-group">
            <label>企业邮箱 <span class="required">*</span></label>
            <input type="email" name="email" placeholder="name@company.com" required />
          </div>
          <div class="form-group">
            <label>设置密码 <span class="required">*</span></label>
            <input type="password" name="password" placeholder="至少8位" required minlength="8" />
          </div>
          <div class="form-group">
            <label>确认密码 <span class="required">*</span></label>
            <input type="password" name="password2" placeholder="再次输入密码" required />
          </div>
          <div class="form-group">
            <label>联系人姓名 <span class="required">*</span></label>
            <input type="text" name="contact_name" placeholder="您的姓名" required />
          </div>
          <div class="form-group">
            <label>联系电话 <span class="required">*</span></label>
            <input type="tel" name="contact_phone" placeholder="手机号码" required />
          </div>
        </div>

        <!-- Right: Company Profile -->
        <div class="form-section">
          <h3>企业画像</h3>
          <div class="form-group">
            <label>企业名称 <span class="required">*</span></label>
            <input type="text" name="company_name" placeholder="公司全称" required />
          </div>
          <div class="form-group">
            <label>企业规模 <span class="required">*</span></label>
            <select name="company_size" required>
              <option value="">请选择</option>
              <option value="micro">微型 (1-10人)</option>
              <option value="small">小型 (11-50人)</option>
              <option value="medium">中型 (51-300人)</option>
              <option value="large">大型 (301-1000人)</option>
              <option value="enterprise">集团 (1000+人)</option>
            </select>
          </div>
          <div class="form-group">
            <label>主营业务 <span class="required">*</span></label>
            <textarea name="business_scope" placeholder="简述公司主营业务方向" required></textarea>
          </div>
          <div class="form-group">
            <label>所属行业（多选） <span class="required">*</span></label>
            <div class="chip-select" id="industryChips">
              <!-- populated by JS -->
            </div>
          </div>
          <div class="form-group">
            <label>主要竞争对手 <span class="required">*</span></label>
            <div class="tags-input" id="competitorTags"><input placeholder="输入后按回车添加" /></div>
          </div>
          <div class="form-group">
            <label>上游供应链 <span class="required">*</span></label>
            <div class="tags-input" id="supplyUpTags"><input placeholder="输入后按回车添加" /></div>
          </div>
          <div class="form-group">
            <label>下游客户 <span class="required">*</span></label>
            <div class="tags-input" id="supplyDownTags"><input placeholder="输入后按回车添加" /></div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-back" onclick="history.back()">返回</button>
        <button type="submit" class="btn-submit" id="submitBtn">提交申请</button>
      </div>
    </form>
  </div>

  <div class="login-link">
    已有账号？<a href="login.html">直接登录</a>
  </div>
</div>

<script type="module" src="/src/register-main.ts"></script>
</body>
</html>
