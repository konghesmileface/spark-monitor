name: 'Upload to OSS'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to upload (e.g. 2.5.52)'
        required: true
        type: string
      mode:
        description: 'Mode: upload (files to OSS) or configure (write ossutil config to server)'
        required: true
        default: 'upload'
        type: choice
        options:
          - upload
          - configure

jobs:
  configure-server:
    if: inputs.mode == 'configure'
    runs-on: ubuntu-latest
    steps:
      - name: Write ossutil config to WM server
        env:
          SSH_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.SSH_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.SSH_DEPLOY_USER }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Write ossutil config and bucket info to server
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash -s << SSHEOF
            # Install ossutil if not present
            if ! command -v ossutil &>/dev/null; then
              cd /tmp
              wget -q https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
              unzip -qo ossutil-v1.7.19-linux-amd64.zip
              chmod +x ossutil-v1.7.19-linux-amd64/ossutil64
              mv ossutil-v1.7.19-linux-amd64/ossutil64 /usr/local/bin/ossutil
              rm -rf ossutil-v1.7.19*
            fi
            
            # Configure ossutil
            ossutil config \
              -e "${OSS_ENDPOINT}.aliyuncs.com" \
              -i "${OSS_ACCESS_KEY_ID}" \
              -k "${OSS_ACCESS_KEY_SECRET}"
            
            # Save bucket name
            echo "${OSS_BUCKET}" > /root/.oss_bucket
            
            echo "ossutil configured on server"
            echo "Bucket: ${OSS_BUCKET}"
            ossutil ls "oss://${OSS_BUCKET}/" 2>/dev/null | head -20 || echo "Could not list bucket"
          SSHEOF

          rm ~/.ssh/deploy_key

  upload-to-oss:
    if: inputs.mode == 'upload'
    runs-on: ubuntu-latest
    steps:
      - name: Install ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
          unzip -q ossutil-v1.7.19-linux-amd64.zip
          chmod +x ossutil-v1.7.19-linux-amd64/ossutil64
          sudo mv ossutil-v1.7.19-linux-amd64/ossutil64 /usr/local/bin/ossutil

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
        run: |
          ossutil config \
            -e "${OSS_ENDPOINT}.aliyuncs.com" \
            -i "$OSS_ACCESS_KEY_ID" \
            -k "$OSS_ACCESS_KEY_SECRET"

      - name: Download from GitHub release and upload to OSS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          VERSION: ${{ inputs.version }}
        run: |
          TAG="v${VERSION}"
          mkdir -p downloads
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern 'Spark.Monitor_*' \
            --dir ./downloads 2>/dev/null && {
            echo "Downloaded from GitHub release:"
            ls -lh downloads/
          } || {
            echo "No GitHub release found for $TAG"
            exit 1
          }

          for file in downloads/Spark.Monitor_*; do
            if [ -f "$file" ]; then
              echo "Uploading $(basename "$file")..."
              ossutil cp "$file" "oss://${OSS_BUCKET}/$(basename "$file")" \
                --meta "Cache-Control:public,max-age=604800" \
                --meta "Content-Disposition:attachment" \
                -f
            fi
          done
          echo "All files uploaded to OSS"
          ossutil ls "oss://${OSS_BUCKET}/" || true

      - name: Update nginx config
        env:
          SSH_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.SSH_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.SSH_DEPLOY_USER }}
          VERSION: ${{ inputs.version }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash -s << SSHEOF
            cp /etc/nginx/conf.d/worldmonitor.conf "/etc/nginx/conf.d/worldmonitor.conf.bak-\$(date +%Y%m%d-%H%M%S)"
            sed -i 's/Spark\.Monitor_[0-9]\+\.[0-9]\+\.[0-9]\+/Spark.Monitor_${VERSION}/g' /etc/nginx/conf.d/worldmonitor.conf
            nginx -t && systemctl reload nginx
            echo "Nginx updated to version ${VERSION}"
          SSHEOF
          rm ~/.ssh/deploy_key
