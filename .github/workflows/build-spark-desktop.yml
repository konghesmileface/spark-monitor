name: 'Build Spark Monitor Desktop'

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: spark-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            args: '--target aarch64-apple-darwin'
            node_target: 'aarch64-apple-darwin'
            label: 'macOS-ARM64'
            timeout: 180
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            node_target: 'x86_64-apple-darwin'
            label: 'macOS-x64'
            timeout: 180
          - platform: 'windows-latest'
            args: ''
            node_target: 'x86_64-pc-windows-msvc'
            label: 'Windows-x64'
            timeout: 120

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})
    timeout-minutes: ${{ matrix.timeout }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Check version consistency
        run: npm run version:check

      - name: Bundle Node.js runtime
        shell: bash
        env:
          NODE_VERSION: '22.14.0'
          NODE_TARGET: ${{ matrix.node_target }}
        run: bash scripts/download-node.sh --target "$NODE_TARGET"

      - name: Verify bundled Node.js
        shell: bash
        run: |
          if [ "${{ matrix.node_target }}" = "x86_64-pc-windows-msvc" ]; then
            test -f src-tauri/sidecar/node/node.exe
            ls -lh src-tauri/sidecar/node/node.exe
          else
            test -f src-tauri/sidecar/node/node
            test -x src-tauri/sidecar/node/node
            ls -lh src-tauri/sidecar/node/node
          fi

      - name: Build Tauri app (Spark Monitor)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_VARIANT: spark
          VITE_DESKTOP_RUNTIME: '1'
          VITE_WS_API_URL: https://sparkmonitor.cn
          LOCAL_API_REMOTE_BASE: https://sparkmonitor.cn
          LOCAL_API_CLOUD_ONLY: 'true'
        with:
          tagName: v__VERSION__
          releaseName: 'Spark Monitor v__VERSION__'
          releaseBody: 'Spark Monitor 桌面客户端'
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: --config src-tauri/tauri.spark.conf.json ${{ matrix.args }}
          retryAttempts: 1

      - name: Cleanup signing materials
        if: always() && contains(matrix.platform, 'macos')
        shell: bash
        run: |
          rm -f certificate.p12
          security delete-keychain build.keychain 2>/dev/null || true

  upload-to-oss:
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Upload to OSS
    timeout-minutes: 15

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
          unzip -q ossutil-v1.7.19-linux-amd64.zip
          chmod +x ossutil-v1.7.19-linux-amd64/ossutil64
          sudo mv ossutil-v1.7.19-linux-amd64/ossutil64 /usr/local/bin/ossutil

      - name: Configure ossutil
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
        run: |
          ossutil config \
            -e "${OSS_ENDPOINT}.aliyuncs.com" \
            -i "$OSS_ACCESS_KEY_ID" \
            -k "$OSS_ACCESS_KEY_SECRET"

      - name: Download from GitHub release and upload to OSS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          mkdir -p downloads
          echo "Downloading release assets for $TAG..."
          gh release download "$TAG" \
            --repo ${{ github.repository }} \
            --pattern 'Spark.Monitor_*' \
            --dir ./downloads 2>/dev/null && {
            echo "Downloaded from GitHub release:"
            ls -lh downloads/
          } || {
            echo "No release assets found for $TAG — build may still be uploading"
            exit 0
          }

          for file in downloads/Spark.Monitor_*; do
            if [ -f "$file" ]; then
              echo "Uploading $(basename "$file")..."
              ossutil cp "$file" "oss://${OSS_BUCKET}/$(basename "$file")" \
                --meta "Cache-Control:public,max-age=604800" \
                --meta "Content-Disposition:attachment" \
                -f
            fi
          done
          echo "All files uploaded to OSS"

      - name: Update nginx download version
        env:
          SSH_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.SSH_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.SSH_DEPLOY_USER }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash -s << SSHEOF
            if [ -f /etc/nginx/conf.d/worldmonitor.conf ]; then
              cp /etc/nginx/conf.d/worldmonitor.conf "/etc/nginx/conf.d/worldmonitor.conf.bak-\$(date +%Y%m%d-%H%M%S)"
              sed -i 's/Spark\.Monitor_[0-9]\+\.[0-9]\+\.[0-9]\+/Spark.Monitor_${VERSION}/g' /etc/nginx/conf.d/worldmonitor.conf
              nginx -t && systemctl reload nginx
              echo "Nginx updated to version ${VERSION}"
            else
              echo "worldmonitor.conf not found, skipping nginx update"
            fi
          SSHEOF
          rm ~/.ssh/deploy_key
